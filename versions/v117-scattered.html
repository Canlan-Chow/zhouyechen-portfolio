/* NAV */

}
.nav-wrapper.visible { opacity: 1; pointer-events: auto; }
.nav-wrapper:active { cursor: grabbing; }
.nav-dial {
  position: absolute; left: -520px; top: 0;
  width: 780px; height: 780px; border-radius: 50%;
  background: linear-gradient(135deg, rgba(255,255,255,0.45) 0%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.3) 100%);
  backdrop-filter: blur(40px) saturate(180%) brightness(1.1);
  -webkit-backdrop-filter: blur(40px) saturate(180%) brightness(1.1);
  border: 1px solid rgba(255,255,255,0.25);
  box-shadow:
    0 8px 32px rgba(0,0,0,0.08),
    inset 0 4px 0 rgba(255,255,255,0.6),
    inset 0 -4px 0 rgba(0,0,0,0.06),
    inset 4px 0 0 rgba(255,255,255,0.35),
    inset -4px 0 0 rgba(255,255,255,0.35),

}
.nav-dial::before {
  content: '';
  position: absolute; inset: 0; border-radius: 50%;
  background: radial-gradient(circle at 25% 25%, rgba(255,255,255,0.4) 0%, transparent 50%),
              radial-gradient(circle at 75% 75%, rgba(255,255,255,0.15) 0%, transparent 40%);
  pointer-events: none;
}
.nav-dial::after {
  content: '';
  position: absolute; inset: -2px; border-radius: 50%;
  background: radial-gradient(circle, transparent 60%, rgba(255,255,255,0.2) 80%, transparent 100%);
  pointer-events: none;
}
.nav-wrapper:hover .nav-dial {
  left: -130px;
  transition: left 1.2s cubic-bezier(0.34, 1.2, 0.64, 1), box-shadow 1.2s cubic-bezier(0.34, 1.2, 0.64, 1);
  box-shadow:
    0 20px 60px rgba(0,0,0,0.12),
    0 8px 20px rgba(0,0,0,0.08),
    inset 0 4px 0 rgba(255,255,255,0.7),
    inset 0 -4px 0 rgba(0,0,0,0.08),
    inset 4px 0 0 rgba(255,255,255,0.45),
    inset -4px 0 0 rgba(255,255,255,0.45),
    inset 0 0 80px rgba(255,255,255,0.2),
    inset 0 0 160px rgba(255,255,255,0.1);
}
/* 刻度 */
.nav-mark {
  position: absolute; left: 50%; top: 50%;

  white-space: nowrap; transition: color 0.3s;
}
.nav-mark.active { color: #1d1d1f; font-weight: 500; }
.nav-mark:nth-child(1) { transform: rotate(0deg) translateX(340px) translateY(-50%); text-align: right; margin-right: -80px; }
.nav-mark:nth-child(2) { transform: rotate(48deg) translateX(340px) translateY(-50%); text-align: right; margin-right: -80px; font-size: 1.8rem; font-weight: 600; }
.nav-mark:nth-child(3) { transform: rotate(96deg) translateX(370px) translateY(-50%); text-align: right; margin-right: -80px; font-size: 1.375rem; }
.nav-mark:nth-child(4) { transform: rotate(192deg) translateX(390px) translateY(-50%); text-align: right; margin-right: -80px; font-size: 1.2rem; }
.nav-mark:nth-child(5) { transform: rotate(240deg) translateX(380px) translateY(-50%); text-align: right; margin-right: -80px; }

/* HERO */
.hero { position: relative; height: 100vh; overflow: hidden; background: #fff; }
.hero-img {
  width: 100%; height: 100%; object-fit: cover; filter: brightness(0.95);

}
@keyframes imgFade { 0% { opacity: 0; } 100% { opacity: 1; } }
.hero-content {

}

.page-faces .center-box::before, .page-faces .center-box::after {

.page-faces .center-box::after { right: -250px; background: linear-gradient(to right, rgba(0,0,0,0.7), transparent); }

/* COPY TOAST */

/* CUSTOM CURSOR */

    -12px 4px 0 #000, 20px 4px 0 #000,

    -4px 12px 0 #000, 12px 12px 0 #000,
    0px 16px 0 #000, 8px 16px 0 #000,
    4px 20px 0 #000,
    /* red fill */
    -4px -12px 0 #e60000, 0px -12px 0 #e60000, 4px -12px 0 #e60000, 8px -12px 0 #e60000, 12px -12px 0 #e60000,
    -8px -8px 0 #e60000, -4px -8px 0 #e60000, 0px -8px 0 #e60000, 4px -8px 0 #e60000, 8px -8px 0 #e60000, 12px -8px 0 #e60000, 16px -8px 0 #e60000,
    -8px -4px 0 #e60000, -4px -4px 0 #e60000, 0px -4px 0 #e60000, 4px -4px 0 #e60000, 8px -4px 0 #e60000, 12px -4px 0 #e60000, 16px -4px 0 #e60000,
    -8px 0px 0 #e60000, -4px 0px 0 #e60000, 0px 0px 0 #e60000, 4px 0px 0 #e60000, 8px 0px 0 #e60000, 12px 0px 0 #e60000, 16px 0px 0 #e60000,
    -8px 4px 0 #e60000, -4px 4px 0 #e60000, 0px 4px 0 #e60000, 4px 4px 0 #e60000, 8px 4px 0 #e60000, 12px 4px 0 #e60000, 16px 4px 0 #e60000,
    -4px 8px 0 #e60000, 0px 8px 0 #e60000, 4px 8px 0 #e60000, 8px 8px 0 #e60000, 12px 8px 0 #e60000,
    0px 12px 0 #e60000, 4px 12px 0 #e60000, 8px 12px 0 #e60000,
    4px 16px 0 #e60000;
}
body:hover .custom-cursor { opacity: 1; }
</style>
</head>

<script>
function copyText(text) {
  var toast = document.getElementById('copyToast');
  toast.classList.remove('show');
  void toast.offsetHeight;
  toast.classList.add('show');
  setTimeout(function() { toast.classList.remove('show'); }, 4000);
  navigator.clipboard.writeText(text).catch(function() {});
}

var dial = document.getElementById('navDial');
var marks = dial.querySelectorAll('.nav-mark');
var navWrapper = document.getElementById('navWrapper');
var vh = window.innerHeight;

var pageFaces = document.getElementById('pageFaces');
var facesObserver = new IntersectionObserver(function(entries) {
  entries.forEach(function(entry) {
    if (entry.isIntersecting) {
      entry.target.classList.add('in-view');
    }
  });
}, { threshold: 0.2 });
if (pageFaces) facesObserver.observe(pageFaces);

var cursor = document.getElementById('customCursor');
document.addEventListener('mousemove', function(e) {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top = e.clientY + 'px';
});
navWrapper.addEventListener('mouseenter', function() { document.body.classList.add('dial-hover'); });
navWrapper.addEventListener('mouseleave', function() { document.body.classList.remove('dial-hover'); });

function updateNav() {
  var y = window.scrollY;
  var scrollMax = vh * 5;
  var progress = Math.min(y / scrollMax, 1);
  var angle = -progress * 240;
  dial.style.transform = 'rotate(' + angle + 'deg)';
  
  var currentPage = Math.min(Math.round(y / vh), 5);
  navWrapper.classList.toggle('visible', currentPage > 0);
  if (currentPage === 0) return;
  var navIndex = currentPage === 1 ? 1 : (currentPage <= 3 ? 2 : (currentPage <= 4 ? 3 : 4));
  marks.forEach(function(m, i) { m.classList.toggle('active', i === navIndex); });
}
window.addEventListener('scroll', updateNav);
updateNav();

var isDragging = false, lastAngle = 0, accumulatedAngle = 0, scrollStartY = 0;
function getAngle(cx, cy, ex, ey) { return Math.atan2(ey - cy, ex - cx) * (180 / Math.PI); }
navWrapper.addEventListener('mousedown', function(e) {
  isDragging = true; scrollStartY = window.scrollY;
  var r = dial.getBoundingClientRect();
  lastAngle = getAngle(r.left + r.width/2, r.top + r.height/2, e.clientX, e.clientY);
  accumulatedAngle = 0; e.preventDefault();
});
window.addEventListener('mousemove', function(e) {
  if (!isDragging) return;
  var r = dial.getBoundingClientRect();
  var currentAngle = getAngle(r.left + r.width/2, r.top + r.height/2, e.clientX, e.clientY);
  var delta = currentAngle - lastAngle;
  if (delta > 180) delta -= 360;
  if (delta < -180) delta += 360;
  accumulatedAngle += delta; lastAngle = currentAngle;
  var scrollMax = vh * 5;
  window.scrollTo(0, Math.max(0, Math.min(scrollMax, scrollStartY - (accumulatedAngle / 24) * scrollMax)));
});
window.addEventListener('mouseup', function() { isDragging = false; });
</script>

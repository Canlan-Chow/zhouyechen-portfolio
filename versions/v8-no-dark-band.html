<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>周烨琛</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;300;400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  background: #000;
  color: #1d1d1f;
  font-family: 'Noto Serif SC', -apple-system, serif;
  -webkit-font-smoothing: antialiased;
}

/* ─── PAGE 1: Hero ─── */
.hero {
  position: relative;
  height: 100vh;
  overflow: hidden;
  background: #000;
}

@keyframes bgFade {
  0% { background: #000; }
  100% { background: #000; }
}

.hero-img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0;
  animation: imgFade 2.5s ease-out 0.2s forwards;
  filter: brightness(0.85);
}

@keyframes imgFade {
  0% { opacity: 0; }
  100% { opacity: 1; }
}

/* Bottom edge: image fades gently into white */
.hero::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 35vh;
  background: linear-gradient(to bottom, transparent 0%, #fff 100%);
  z-index: 2;
  pointer-events: none;
}

.hero-content {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 3;
  padding: 2rem;
}

.hero-content h1 {
  font-size: clamp(2rem, 5vw, 3.5rem);
  font-weight: 300;
  letter-spacing: 0.04em;
  text-align: center;
  line-height: 1.3;
  color: #fff;
  opacity: 0;
  animation: textFade 4s ease-out 1.5s forwards;
  text-shadow: 0 1px 20px rgba(0,0,0,0.3);
}

.hero-content .sub {
  margin-top: 1.2rem;
  font-size: clamp(0.95rem, 2.2vw, 1.4rem);
  font-weight: 200;
  color: #fff;
  text-align: center;
  letter-spacing: 0.02em;
  opacity: 0;
  animation: textFade 4s ease-out 2.5s forwards;
  text-shadow: 0 1px 12px rgba(0,0,0,0.3);
}

@keyframes textFade {
  0% { opacity: 0; transform: translateY(6px); }
  100% { opacity: 1; transform: translateY(0); }
}

/* ─── PAGE 2: Blank white ─── */
.blank {
  min-height: 100vh;
  background: #fff;
  position: relative;
}

.blank::before { display: none; }
</style>
</head>
<body>

<!-- PAGE 1: Hero with photo -->
<div class="hero">
  <img class="hero-img" src="hero_grain.jpg" alt="">
  <div class="hero-content">
    <h1>你好，我是周烨琛</h1>
    <p class="sub">或者，我更喜欢别人叫我周灿烂</p>
  </div>
</div>

<!-- PAGE 2: Blank white -->
<div class="blank"></div>

</body>
</html>
